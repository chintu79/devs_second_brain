<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devventory — Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e1e1e1;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .container { width: 100%; max-width: 480px; }
    h1 {
      font-size: 20px; font-weight: 600; margin-bottom: 4px;
      display: flex; align-items: center; gap: 10px;
    }
    h1 svg { width: 22px; height: 22px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
      padding: 20px; margin-bottom: 16px;
    }
    .card h2 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 12px; border: 1px solid #333; border-radius: 6px;
      background: #0d0d0d; color: #e1e1e1; font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366F1; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366F1; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; margin-top: 12px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.checking { background: #f59e0b; animation: pulse 1s infinite; }
    .error { color: #ef4444; font-size: 12px; margin-top: 8px; }
    .success { color: #22c55e; font-size: 12px; margin-top: 8px; }
    .info { font-size: 12px; color: #888; margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .flex { display: flex; gap: 8px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="container" id="root"></div>
  <script type="module" src="./App.tsx"></script>
</body>
</html>
